services:
  nextjs-app:
    build: .
    network_mode: "host"
    restart: always
    env_file: .env
    volumes:
      - ./db/custom.db:/app/db/custom.db

  caddy-ssl:
    image: caddy:latest
    network_mode: "host"
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
